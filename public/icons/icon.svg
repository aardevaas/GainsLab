<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="96" fill="#090D15"/>
  <!-- Orange accent bar — left edge of the G -->
  <rect x="144" y="128" width="32" height="256" rx="16" fill="#FF8000"/>
  <!-- Top horizontal bar -->
  <rect x="144" y="128" width="224" height="32" rx="16" fill="#FF8000"/>
  <!-- Bottom horizontal bar -->
  <rect x="144" y="352" width="224" height="32" rx="16" fill="#FF8000"/>
  <!-- Middle arm of G -->
  <rect x="256" y="240" width="112" height="32" rx="16" fill="#FF8000"/>
  <!-- Right vertical bar (bottom half only — makes it a G not a C) -->
  <rect x="336" y="240" width="32" height="144" rx="16" fill="#FF8000"/>
</svg>